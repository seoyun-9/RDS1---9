<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .handle {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) rotate(-90deg);
            color: #FF0090;
            font-size: 2vw;
            cursor: grab;
            z-index: 10;
            user-select: none;
        }
        .handle:active { cursor: grabbing; }
        .side-handle {
            position: absolute;
            bottom: 40px;
            top: auto;
            transform: none;
            color: #FF0090;
            font-size: 2vw;
            cursor: pointer;
            z-index: 10;
            user-select: none;
        }
        .side-handle.left { left: 5%; }
        .side-handle.right { right: 5%; }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #FF0090;
            font-size: 1.2vw;
            cursor: pointer;
            z-index: 10;
            text-decoration: none;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div class="stage">
        <canvas id="canvas"></canvas>
        <a class="back-btn" id="backBtn">← back</a>
        <div class="handle" id="handle">▼</div>
        <div class="side-handle left" id="prevBtn">|</div>
        <div class="side-handle right" id="nextBtn">|</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const photoNum = parseInt(params.get('photo')) || 1;
        const videoUrl = params.get('url') ? decodeURIComponent(params.get('url')) : null;

        document.getElementById('backBtn').href = 'Index.html';

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const mainImg = new Image();
        const prevImg = new Image();
        const nextImg = new Image();

        mainImg.src = `photo${photoNum}.jpg`;
        prevImg.src = `scenes/photo${photoNum}_prev.jpg`;
        nextImg.src = `scenes/photo${photoNum}_next.jpg`;

        let currentScene = 0;
        let pixelSize = 1;
        let isDragging = false;
        let startX = 0;
        let dragAmount = 0;

        function drawPixelated(img, pixelSize) {
            if (!img.complete || img.naturalWidth === 0) return;
            const w = canvas.width;
            const h = canvas.height;
            const imgRatio = img.naturalWidth / img.naturalHeight;
            const canvasRatio = w / h;
            let drawW, drawH, drawX, drawY;
            if (imgRatio > canvasRatio) {
                drawH = h * 0.8;
                drawW = drawH * imgRatio;
            } else {
                drawW = w * 0.6;
                drawH = drawW / imgRatio;
            }
            drawX = (w - drawW) / 2;
            drawY = (h - drawH) / 2;
            if (pixelSize <= 1) {
                ctx.drawImage(img, drawX, drawY, drawW, drawH);
            } else {
                const offCanvas = document.createElement('canvas');
                const smallW = Math.max(1, Math.floor(drawW / pixelSize));
                const smallH = Math.max(1, Math.floor(drawH / pixelSize));
                offCanvas.width = smallW;
                offCanvas.height = smallH;
                const offCtx = offCanvas.getContext('2d');
                offCtx.drawImage(img, 0, 0, smallW, smallH);
                ctx.imageSmoothingEnabled = false;
                ctx.drawImage(offCanvas, drawX, drawY, drawW, drawH);
                ctx.imageSmoothingEnabled = true;
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (currentScene === -1) {
                drawPixelated(prevImg, pixelSize);
            } else if (currentScene === 1) {
                drawPixelated(nextImg, pixelSize);
            } else {
                drawPixelated(mainImg, pixelSize);
            }
        }

        // 캔버스 더블클릭하면 유튜브로 이동
        canvas.addEventListener('dblclick', () => {
            if (videoUrl) window.open(videoUrl, '_blank');
        });

        const handle = document.getElementById('handle');

        handle.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            dragAmount = 0;
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            dragAmount = e.clientX - startX;
            handle.style.left = `${e.clientX}px`;
            handle.style.transform = 'translateX(-50%) rotate(-90deg)';
            const absDrag = Math.abs(dragAmount);
            pixelSize = Math.max(1, Math.floor(absDrag / 20));
            if (dragAmount < -80) {
                currentScene = 1;
            } else if (dragAmount > 80) {
                currentScene = -1;
            } else {
                currentScene = 0;
            }
            render();
        });

        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            handle.style.left = '50%';
            handle.style.transform = 'translateX(-50%) rotate(-90deg)';
            if (Math.abs(dragAmount) < 80) {
                currentScene = 0;
                pixelSize = 1;
            }
            dragAmount = 0;
            render();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            currentScene = -1;
            pixelSize = 1;
            render();
        });
        document.getElementById('nextBtn').addEventListener('click', () => {
            currentScene = 1;
            pixelSize = 1;
            render();
        });

        mainImg.onload = render;
        prevImg.onload = render;
        nextImg.onload = render;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        });

        render();
    </script>
</body>
</html>
